        .hotspot.active { background: #1e3a8a; color: white; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .identity-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

                        <div class="text-left leading-none">

    <script>

            ]},
            { id: 1, title: "Aspectos destacados", header: "Aspectos destacados y Características", subtitle: "LECCIÓN 2 DE 15", blocks: [
                { type: 'list', items: [

                    { id: 'pin', title: "Proceso de Firma Remota PIN-to-Sign", content: `

                            <div class="bg-blue-50 border border-blue-100 rounded-3xl p-8 shadow-sm">

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 uppercase italic font-black text-center">
                                    <div class="bg-white border-2 border-dashed border-gray-200 p-6 rounded-2xl flex flex-col items-center gap-3">
                                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                        <span class="text-[10px]">Vía Email</span>
                                    </div>
                                    <div class="bg-white border-2 border-blue-600 p-6 rounded-2xl flex flex-col items-center gap-3 shadow-md">
                                        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                        <span class="text-[10px]">Vía SMS</span>
                                    </div>
                                </div>
                                <div class="p-5 bg-white rounded-2xl flex justify-between items-center shadow-sm border border-blue-50">
                                    <div><p class="font-bold text-blue-900 text-[10px] uppercase mb-1 leading-none text-left">PIN DEL CLIENTE:</p><p class="font-black text-2xl text-slate-800 tracking-[0.4em] leading-none text-left">XXXX-XX</p></div>
                                    <button class="bg-blue-700 text-white font-black px-6 py-3 rounded-xl text-xs uppercase shadow-lg leading-none active:scale-95 transition-all">Confirmar PIN</button>
                                </div>
                            </div>
                        </div>`
                    },
                    { id: 'cash', title: "Protección Permanente y Valor en Efectivo", content: "Ofrece primas niveladas garantizadas y protección permanente de por vida. La póliza acumula valor en efectivo (Cash Value) accesible mediante préstamos de póliza." },
                    { id: 'everest', title: "Servicios Concierge Funerario", content: "Apoyo personalizado 24/7 con Everest Funeral Package para negociar precios funerarios y soporte emocional sin costo adicional de prima." }
                ]},
                { type: 'cards', data: [
                    { t: "Mayor Productividad", items: ["Venta eficiente presencial o virtual.", "Decisión instantánea en el 100% de los casos.", "Portal diseñado para el autoservicio."] },
                    { t: "Ventaja Competitiva", items: ["Protección rápida liderada por el agente.", "Configuración según el presupuesto del cliente.", "CPR incluido en pólizas aplicables."] }
                ]}
            ]},
            { id: 2, title: "Concierge Planning Rider", header: "Concierge Planning Rider (CPR)", subtitle: "LECCIÓN 3 DE 15", blocks: [
                { type: 'text', body: "El Concierge Planning Rider℠ (CPR) es una oferta única en su clase de servicios de planificación funeraria y apoyo disponible para sus clientes de Transamerica sin costo adicional." },
                { type: 'text', body: "En Florida, Maryland y California, este beneficio se denomina **Concierge Planning Benefit℠**. Los servicios se ofrecen fuera de la póliza contractual." },

                { type: 'tabs_cpr' },
                { type: 'section_header', text: "Servicios del Beneficio" },
                { type: 'grid_cpr' },
                { type: 'flex_content', left: { title: "FOLLETO EN ESPAÑOL", body: "Consulte el folleto para prospectos con todos los detalles traducidos.", button: "Ver Folleto", url: "https://cdn.bfldr.com/86JM1UOD/as/7vtz4w87kpvqk5b5kcw4kj/Transamerica_Spanish_Consumer_Brochure" }, right: { title: "Cómo posicionarlo", body: "👉 “Es un servicio profesional que toma las riendas administrativas para su familia en el peor momento.”" } }
            ]},
            { id: 3, title: "Productos y Underwriting", header: "Productos y Underwriting", subtitle: "LECCIÓN 4 DE 15", blocks: [
                { type: 'resource_grid', resources: [
                    { title: "Guía del Agente", label: "AGENT GUIDE", url: "https://cdn.bfldr.com/86JM1UOD/as/m7q69ngk78kw39p7w5923h/Transamerica_FE_Express_Solution_Agent_Guide" },
                    { title: "Spec Sheet", label: "SPEC SHEET", url: "https://cdn.bfldr.com/86JM1UOD/as/bq6jb32fxcnmqnkxw4g4qs9m/Transamerica_FE_Express_Solution_Spec_Sheet" },
                    { title: "FE Comparison", label: "COMPARISON", url: "https://cdn.bfldr.com/86JM1UOD/as/5928r6ph3w7m8x7p9xnp/Transamerica_FE_Express_Solution_Comparison_Flyer" },
                    { title: "Consumer Brochure", label: "BROCHURE", url: "https://cdn.bfldr.com/86JM1UOD/as/7vtz4w87kpvqk5b5kcw4kj/Transamerica_Spanish_Consumer_Brochure" }
                ]},

                { type: 'section_header', text: "EXPRESS AGENT DASHBOARD" },
                { type: 'dashboard_sim' },
                { type: 'section_header', text: "VERIFICAR IDENTIDAD" },
                { type: 'error_form' },
                { type: 'life_access' }
            ]},
            { id: 11, category: "ESTRUCTURA FINANCIERA", title: "Comisiones", header: "💰 ¿Cómo se pagan tus comisiones?", subtitle: "LECCIÓN 12 DE 15", blocks: [
                { type: 'section_header', text: "Estados Estándar (Other States)" },
                { type: 'text', body: "En la mayoría de los estados, Transamerica paga una comisión basada en la prima del primer año con un adelanto (Advance) típico del 75% al emitirse la póliza." },
                { type: 'comm_grid_steps' },
                { type: 'math_examples_standard' },
                { type: 'section_header', text: "🗽 Nueva York (NY State)" },
                { type: 'text', body: "En NY, las comisiones se rigen por la Sección 4228 de la Ley de Seguros. La estructura prioriza la estabilidad y las renovaciones superiores." },
                { type: 'ny_detailed_info' },
                { type: 'math_examples_ny' },
                { type: 'mentalidad_oro', text: "Tu enfoque debe ser la producción constante. Mientras más pre-califiques con calidad, más rápido verás tus depósitos." }
            ]}
        ];

        // --- RENDER LOGIC ---
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';
            lessons.forEach((l, idx) => {
                if (l.category && (idx === 0 || lessons[idx-1].category !== l.category)) {
                    nav.innerHTML += `<div class="px-6 py-4 text-[9px] text-gray-500 uppercase tracking-widest border-t border-gray-100 mt-2 text-left font-black leading-none">${l.category}</div>`;
                }
                const activeClass = state.currentLesson === idx ? 'bg-blue-50 border-blue-600 text-blue-900 font-bold' : 'border-transparent text-gray-500 hover:bg-gray-100';
                nav.innerHTML += `<button onclick="handleGoToLesson(${idx})" class="w-full flex items-center gap-3 px-6 py-3.5 border-l-4 transition-all text-left ${activeClass}"><div class="w-3.5 h-3.5 border-2 rounded-full ${state.currentLesson === idx ? 'border-blue-600' : 'border-gray-300'}"></div><span class="leading-tight uppercase italic font-bold">${l.title}</span></button>`;
            });
            document.getElementById('progress-bar').style.width = `${((state.currentLesson + 1) / lessons.length) * 100}%`;
        }

        function renderMainContent() {
            const container = document.getElementById('main-content');
            const data = lessons[state.currentLesson];
            container.innerHTML = `<div class="max-w-5xl mx-auto animate-in"><p class="text-[10px] font-black text-gray-400 tracking-[0.2em] mb-4 uppercase text-left font-black leading-none uppercase">${data.subtitle}</p><h1 class="text-6xl font-black text-slate-900 mb-16 tracking-tighter uppercase italic leading-none text-left font-black italic uppercase">${data.header}</h1><div id="blocks-area" class="space-y-12 text-left"></div><div class="mt-32 py-16 border-t flex justify-center"><button onclick="handleNextLesson()" class="flex items-center gap-8 px-16 py-10 bg-blue-900 text-white font-black rounded-[2.5rem] shadow-2xl uppercase tracking-[0.3em] text-xs hover:scale-105 transition-transform active:scale-95 italic font-black leading-none uppercase italic">Siguiente Lección <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg></button></div></div>`;
            
            const area = document.getElementById('blocks-area');
            data.blocks.forEach(block => {
                const div = document.createElement('div');
                div.className = "animate-in text-left";
                switch(block.type) {
                    case 'text': div.innerHTML = `<p class="text-[19px] text-gray-600 leading-relaxed font-light mb-6 text-left font-medium normal-case">${block.body}</p>`; break;
                    case 'requirements': div.innerHTML = `<div class="bg-blue-50/50 border-2 border-blue-100 rounded-[2rem] p-12 text-blue-900 text-left shadow-sm mb-12 italic uppercase font-black leading-none text-left font-black"><h4 class="text-2xl font-black mb-8 flex items-center gap-3 tracking-tighter uppercase italic font-black">REQUISITOS BÁSICOS</h4><ul class="space-y-5 text-base font-bold mb-10 text-left font-black"><li>• SSN DEL ASEGURADO</li><li>• NOMBRE, DOB Y DIRECCIÓN</li><li>• CUENTA BANCARIA O TARJETA</li></ul><p class="font-black text-lg tracking-tighter uppercase italic text-blue-900 text-left leading-none uppercase italic font-black">👉 PROCESO 100% DIGITAL EN MINUTOS</p></div>`; break;
                    case 'list': div.innerHTML = `<ul class="space-y-6 text-left mb-12 text-left font-bold italic uppercase font-black leading-none">${block.items.map(i => `<li class="flex gap-4 items-start text-gray-700 text-lg font-bold italic uppercase text-left"><div class="w-2 h-2 rounded-full bg-blue-900 mt-2.5 shrink-0 shadow-sm text-left"></div>${i}</li>`).join('')}</ul>`; break;
                    case 'accordion': div.innerHTML = `<div class="space-y-6 mb-12 uppercase italic font-black text-left">${block.items.map(it => `<div class="bg-white border border-gray-100 rounded-[1.5rem] overflow-hidden shadow-sm text-left font-black"><button onclick="handleToggleAcc('${it.id}')" class="w-full p-8 font-black text-slate-800 text-xl tracking-tighter text-left flex justify-between items-center italic group font-black"><span>${it.title}</span><svg class="w-7 h-7 text-blue-600 transition-transform ${state.openAccordion===it.id?'rotate-45':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button><div class="${state.openAccordion===it.id?'block':'hidden'} p-10 text-[18px] text-gray-500 font-light leading-relaxed border-t border-gray-50 normal-case italic font-medium text-left font-medium italic">${it.content}</div></div>`).join('')}</div>`; break;
                    case 'tabs_cpr': div.innerHTML = `<div class="border border-gray-200 rounded-[1.5rem] overflow-hidden shadow-xl bg-white mb-12 uppercase italic font-black text-left leading-none font-black"><div class="flex border-b text-center leading-none uppercase font-black italic"><button onclick="handleSetTab('eligibility')" class="flex-1 py-10 text-[12px] font-black ${state.activeTab==='eligibility'?'bg-white text-blue-900 border-b-4 border-blue-900':'bg-gray-50 text-gray-400'}">ELEGIBILIDAD</button><button onclick="handleSetTab('termination')" class="flex-1 py-10 text-[12px] font-black ${state.activeTab==='termination'?'bg-white text-blue-900 border-b-4 border-blue-900':'bg-gray-50 text-gray-400'}">TERMINACIÓN</button></div><div class="p-12 min-h-[350px] normal-case font-medium italic text-left leading-relaxed font-bold italic font-medium text-left">${getTabHtml()}</div></div>`; break;

                eval: `<div class="space-y-4 animate-in italic font-black uppercase"><h4 class="text-2xl font-black mb-6 text-blue-400 uppercase italic font-black italic leading-none font-black italic">🧠 Evaluación Digital Automatizada</h4><ul class="grid grid-cols-2 gap-4 text-[10px] font-black uppercase text-white leading-none font-black italic font-black italic"><li>• Identidad y SSN</li><li>• Historial MIB</li><li>• Recetas ScriptCheck</li><li>• Récord Motor MVR</li></ul><p class="mt-8 text-sm italic text-slate-300 font-bold italic font-black">Transamerica procesa estos datos en milisegundos para darte una decisión inmediata mientras estás en la llamada.</p></div>`,
                flujo: `<div class="space-y-4 animate-in italic font-black uppercase"><h4 class="text-2xl font-black mb-6 text-amber-400 uppercase italic text-left font-black italic leading-none font-black italic">⚡ Flujo Real</h4><div class="space-y-4 text-sm font-light text-white text-left leading-relaxed font-bold italic font-black italic">1. Ingreso iGO e-App {'→'} 2. Revisión Médica Digital {'→'} 3. Decisión Automática.<br><br><strong>👉 Aprobación inmediata sin laboratorios ni exámenes físicos.</strong></div></div>`,
                check: `<div class="space-y-4 animate-in italic font-black uppercase text-left font-black italic"><h4 class="text-2xl font-black mb-6 text-green-400 uppercase italic text-left font-black italic leading-none font-black italic font-black italic">📋 Checklist de Pre-calificación</h4><div class="space-y-5 text-xs font-light text-white text-left leading-relaxed italic font-bold font-black italic"><strong>1. Identidad:</strong> SSN Válido (Mandatorio).<br><strong>2. Interés Asegurable:</strong> Relación financiera o afectiva demostrable real.<br><strong>3. Verificación Dueño:</strong> Validación PIN adicional si dueño es distinto al asegurado.</div></div>`,
                salud: `<div class="space-y-6 text-left animate-in italic font-black uppercase text-left font-black italic uppercase font-black text-left"><h4 class="text-2xl font-black text-red-400 uppercase italic italic font-black leading-none mb-6 italic uppercase font-black text-left">❤️ Clasificación & Salud</h4><div class="space-y-4 text-[11px] leading-snug italic font-black uppercase text-left font-black italic uppercase font-black text-left"><div class="bg-white/5 p-4 rounded-xl border border-white/10 text-left font-black italic uppercase font-black text-left"><p class="text-green-400 font-black italic mb-1 uppercase font-black italic uppercase font-black text-left">✅ Preferred (Mejor Caso)</p><p class="opacity-80 mb-1 italic font-bold leading-none font-black italic uppercase font-black text-left">Persona funcional. Sin condiciones graves. Ej: HBP estable con 1 medicina.</p></div><div class="bg-white/5 p-4 rounded-xl border border-white/10 text-left font-black italic uppercase font-black text-left"><p class="text-blue-400 font-black italic mb-1 uppercase font-black italic uppercase font-black text-left">⚖️ Standard (Caso Normal)</p><p class="opacity-80 mb-1 italic font-bold leading-none font-black italic uppercase font-black text-left">1 condición estable. Ej: Diabetes T2 (oral), Colesterol, Apnea.</p></div><div class="bg-white/5 p-4 rounded-xl border border-white/10 text-left font-black italic uppercase font-black text-left"><p class="text-amber-400 font-black italic mb-1 uppercase font-black italic uppercase font-black text-left">⚠️ Graded (Caso Delicado)</p><p class="opacity-80 mb-1 italic font-bold leading-none font-black italic uppercase font-black text-left">Riesgo moderado. Ej: Hospitalización reciente, polimedicados.</p></div><div class="bg-white/5 p-4 rounded-xl border border-white/10 text-left font-black italic uppercase font-black text-left"><p class="text-red-400 font-black italic mb-1 uppercase text-left uppercase font-black italic uppercase font-black text-left">❌ Decline (No Aplicar)</p><p class="opacity-80 italic font-bold leading-none font-black italic uppercase font-black text-left">Condiciones severas. Ej: Cáncer (< 2 años), Demencia, DUI reciente.</p></div></div></div>`
            };
            return u[state.activeUw];
        }

        function getProdHtml() {
            const p = {
                express: `<h4 class="text-xl font-black text-slate-800 uppercase italic mb-4 font-black italic uppercase leading-none">⚡ FE Express (Cobertura Total)</h4>Cobertura completa 100% desde hoy. Ideal para clientes saludables o condiciones bien controladas. Decisión inmediata. Sin períodos de espera por muerte natural.`,
                graded: `<h4 class="text-xl font-black text-slate-800 uppercase italic mb-4 font-black italic uppercase leading-none">⚠️ Graded (Cobertura Gradual)</h4>Período de espera de 2 años para muerte natural (Natural Años 1-2: 100% primas + 10% interés). Año 3+: 100% beneficio. <strong>Muerte accidental paga 100% desde el día 1.</strong>`,
                rop: `<h4 class="text-xl font-black text-slate-800 uppercase italic mb-4 font-black italic uppercase leading-none">💰 ROP (Return of Premium)</h4>Devolución de primas pagadas más interés acumulado durante el periodo inicial de 2 años. Al tercer año paga el beneficio total.`,
                immediate: `<h4 class="text-xl font-black text-slate-800 uppercase italic mb-4 font-black italic uppercase leading-none">🚀 Immediate (Aprobación Plena)</h4>Aprobación directa con pago íntegro del beneficio por cualquier causa desde el primer momento de vigencia. Reservado para perfiles óptimos.`
            };
            return p[state.activeProduct];
        }

        // --- HANDLERS ---
        window.handleGoToLesson = (idx) => { state.currentLesson = idx; state.openAccordion = null; renderSidebar(); renderMainContent(); };
        window.handleNextLesson = () => { if(state.currentLesson < lessons.length - 1) handleGoToLesson(state.currentLesson + 1); };
        window.handleToggleAcc = (id) => { state.openAccordion = state.openAccordion === id ? null : id; renderMainContent(); };
        window.handleSetTab = (id) => { state.activeTab = id; renderMainContent(); };
        window.handleSetUw = (id) => { state.activeUw = id; renderMainContent(); };
        window.handleSetProd = (id) => { state.activeProduct = id; renderMainContent(); };
        window.toggleSidebar = () => { state.isSidebarOpen = !state.isSidebarOpen; document.getElementById('sidebar').style.width = state.isSidebarOpen ? '288px' : '0px'; };
        
        window.handleHs = (id) => {
            const h = {
                hs1: { t: "Información del Agente", d: "Confirma tu identidad y sesión activa para validez legal del contrato." },
                hs2: { t: "New Application", d: "Inicie aquí la aplicación digital 100% (decisión en 10 min)." },
                hs3: { t: "Pre-qualification", d: "Cuestionario médico rápido previo a la aplicación oficial." },
                hs4: { t: "Get Quote", d: "Obtenga una estimación de precio basada en salud probable." },
                hs5: { t: "CA Disclosure", d: "Formulario obligatorio en CA para prospectos mayores de 65 años." },
                hs6: { t: "Agent Signature", d: "El cliente ya firmó. Aplique su firma electrónica ahora." },
                hs7: { t: "Initial Answers", d: "Solicitud en proceso. Complete los datos restantes aquí." },
                hs8: { t: "Finalize Coverage", d: "¡Cliente aprobado! Proceda a finalizar beneficiarios y pago." },
                hs9: { t: "Navegación", d: "Menú de gestión de aplicaciones y estados de póliza." }
            };
            state.dashboardTitle = h[id].t;
            state.dashboardDesc = h[id].d;
            renderMainContent();
        }

        window.openAiModal = () => { document.getElementById('ai-modal').classList.remove('hidden'); if(state.chatHistory.length===0) startAiChat(); };
        window.closeAiModal = () => document.getElementById('ai-modal').classList.add('hidden');
        async function startAiChat() {
            state.isAiTyping = true; renderChat();
            const res = await callApi("Inicia la simulación saludando escépticamente.", "Eres Don Manuel, 68 años, Texas. Diabetes T2. Eres escéptico. Saluda seco preguntando quién eres.");
            state.chatHistory.push({role:'ai', text:res}); state.isAiTyping = false; renderChat();
        }
        async function handleChatSubmit(e) {
            e.preventDefault(); const i = document.getElementById('chat-input'); const v = i.value.trim(); if(!v||state.isAiTyping) return;
            state.chatHistory.push({role:'user', text:v}); i.value=''; state.isAiTyping=true; renderChat();
            const res = await callApi(state.chatHistory.map(m=>m.text).join("\n"), "Actúa como Don Manuel. Pon objeciones.");
            state.chatHistory.push({role:'ai', text:res}); state.isAiTyping=false; renderChat();
        }
        async function callApi(p, s) {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {method:'POST', body:JSON.stringify({contents:[{parts:[{text:p}]}], systemInstruction:{parts:[{text:s}]}})});
            const d = await r.json(); return d.candidates[0].content.parts[0].text;
        }
        function renderChat() {
            const b = document.getElementById('chat-box');
            b.innerHTML = state.chatHistory.map(m=>`<div class="flex ${m.role==='user'?'justify-end':'justify-start'} animate-in"><div class="max-w-[80%] p-6 rounded-[1.5rem] shadow-sm text-lg leading-relaxed ${m.role==='user'?'bg-blue-600 text-white rounded-tr-none':'bg-white text-gray-700 font-light border'}">${m.text}</div></div>`).join('');
            if(state.isAiTyping) b.innerHTML += `<div class="flex justify-start animate-in"><div class="bg-white p-5 rounded-2xl border flex gap-1"><div class="w-1.5 h-1.5 bg-blue-300 rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-blue-300 rounded-full animate-bounce" style="animation-delay:0.2s"></div></div></div>`;
            b.scrollTop = b.scrollHeight;
        }

        window.onload = () => { renderSidebar(); renderMainContent(); };
    </script>
</body>
</html>
